<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <link rel="stylesheet" href="autojax-admin.css">
    <!-- add your stylesheet here -->
</head>
<body>
    <h1>Reset Password</h1>
    <div id="token-error"></div>
    <div id="form-area">
        <p>Enter and confirm your new password.</p>
        <label for="new-password">New password</label>
        <div class="pwd-wrapper">
            <input type="password" id="new-password" autocomplete="new-password">
            <img class="pwd-toggle" id="toggle-new" src="/backend/autojax/assets/show.png" alt="Toggle visibility">
        </div>
        <p class="requirements">
            12 to 72 characters including uppercase, lowercase, digit, and symbol.
        </p>
        <label for="confirm-password">Confirm new password</label>
        <div class="pwd-wrapper">
            <input type="password" id="confirm-password" autocomplete="new-password">
            <img class="pwd-toggle" id="toggle-confirm" src="/backend/autojax/assets/show.png" alt="Toggle visibility">
        </div>
        <div id="error-msg" class="error-msg"></div>
        <button type="button" id="submit-btn" class="default-button">Set New Password</button>
    </div>
    <div id="success-msg">
        Your password has been reset. Redirecting to login...
    </div>
    <a id="back-link" href="/">Back to login</a>
    <script type="importmap">{"imports":{"autojax/":"/backend/autojax/"}}</script>
    <script type="module" src="/backend/autojax/autojax-reset-password.js"></script>
</body>
</html>
