<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="autojax-admin.css">
    <!-- add your stylesheet here -->
</head>
<body>
    <h1>Forgot Password</h1>
    <p>Enter your email address or display name and we will send you a reset link.</p>
    <div id="form-area">
        <label for="identifier">Email address or display name</label>
        <input type="text" id="identifier" autocomplete="username">
        <div id="error-msg" class="error-msg"></div>
        <button type="button" id="submit-btn" class="default-button">Send Reset Link</button>
    </div>
    <div id="success-msg">
        If a match was found for that identifier, a password reset email has been sent.
        Please check your email.
    </div>
    <a id="back-link" href="/">Back to login</a>
    <script type="importmap">{"imports":{"autojax/":"/backend/autojax/"}}</script>
    <script type="module" src="/backend/autojax/autojax-forgot-password.js"></script>
</body>
</html>
